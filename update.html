<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Updating Nexus Roulette...</title>
<style>
body{background:#0f1923;color:#e2e8f0;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;}
</style>
</head>
<body>
<div>
<div style="font-size:40px;margin-bottom:16px">🔄</div>
<div style="font-size:18px;font-weight:800;margin-bottom:8px">Updating Nexus Roulette...</div>
<div style="font-size:13px;color:#94a3b8">Clearing old cache. One moment.</div>
</div>
<script>
(function(){
  var done = 0, total = 2;
  function check(){ done++; if(done>=total) setTimeout(function(){ window.location.href="https://cortana-phillip.github.io/nexus-roulette/?cleared="+Date.now(); }, 1000); }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      Promise.all(regs.map(function(r){return r.unregister();})).then(check);
    }).catch(check);
  } else check();
  if('caches' in window){
    caches.keys().then(function(keys){
      Promise.all(keys.map(function(k){return caches.delete(k);})).then(check);
    }).catch(check);
  } else check();
})();
</script>
</body>
</html>
